<script>
const { useState, useMemo, useCallback } = React;
const { LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend,
        ResponsiveContainer, ReferenceLine, PieChart, Pie, Cell } = Recharts;

// ── Storage ──────────────────────────────────────────────────────────────────
const SK = "familywealth_v4";


// Storage: tries localStorage, falls back to IndexedDB, falls back to memory
let _mem = null;
const IDB = "FamilyWealthDB", ST = "kv";

function idbOpen() {
  return new Promise((res,rej)=>{
    try {
      const r = indexedDB.open(IDB,1);
      r.onupgradeneeded = e => e.target.result.createObjectStore(ST);
      r.onsuccess = e => res(e.target.result);
      r.onerror = ()=>rej(r.error);
    } catch(e){rej(e);}
  });
}
function idbGet(k){return idbOpen().then(db=>new Promise(res=>{const r=db.transaction(ST,"readonly").objectStore(ST).get(k);r.onsuccess=()=>res(r.result);r.onerror=()=>res(null);})).catch(()=>null);}
function idbSet(k,v){return idbOpen().then(db=>new Promise(res=>{const tx=db.transaction(ST,"readwrite");tx.objectStore(ST).put(v,k);tx.oncomplete=()=>res(true);tx.onerror=()=>res(false);})).catch(()=>false);}

function load() {
  try { const s=localStorage.getItem(SK); if(s) return JSON.parse(s); } catch(e){}
  return _mem;
}
function save(s) {
  _mem = s;
  try { localStorage.setItem(SK,JSON.stringify(s)); return; } catch(e){}
  idbSet(SK,s);
}
// Try to hydrate from IndexedDB on startup (for iPad file:// context)
idbGet(SK).then(d=>{ if(d&&!_mem){ _mem=d; } }).catch(()=>{});


// ── Tax / RRIF constants ──────────────────────────────────────────────────────
const OB=[{l:51000,r:0.2905},{l:101000,r:0.4341},{l:150000,r:0.4341},{l:220000,r:0.4797},{l:Infinity,r:0.5353}];
function tax(inc){let t=0,p=0;for(const b of OB){if(inc<=p)break;t+=(Math.min(inc,b.l)-p)*b.r;p=b.l;}return t;}
function mRate(inc){for(const b of OB){if(inc<=b.l)return b.r;}return 0.5353;}
const OAS=8500,TROOM=7000,OASC=90997;
const RR={71:0.0528,72:0.054,73:0.0553,74:0.0567,75:0.0582,76:0.0598,77:0.0621,78:0.0631,79:0.0663,80:0.0682,81:0.0703,82:0.0726,83:0.075,84:0.0776,85:0.0853,86:0.0889,87:0.0927,88:0.0968,89:0.101,90:0.1057};

// ── Scenario presets ──────────────────────────────────────────────────────────
const RETURN_RATES=[
  {label:"Conservative",value:6,color:"#4A90D9"},
  {label:"Moderate",value:8,color:"#27AE60"},
  {label:"Optimistic",value:10,color:"#E67E22"},
  {label:"Aggressive",value:12,color:"#E74C3C"},
];
const DD_PRESETS={
  conservative:{label:"Conservative",color:"#4A90D9",d1:80000,d2:60000,d3:50000},
  balanced:    {label:"Balanced",    color:"#27AE60",d1:0,d2:0,d3:0},
  aggressive:  {label:"Aggressive",  color:"#E67E22",d1:150000,d2:100000,d3:75000},
};

const CLR=["#4A90D9","#27AE60","#E67E22","#E74C3C","#9B59B6","#1ABC9C","#F39C12","#8E44AD"];

// ── Default data ──────────────────────────────────────────────────────────────
const DA=[
  {id:"sq_rrsp",  owner:"Person 1",  inst:"Questrade",   type:"RRSP",        bal:0,h:[],lu:null},
  {id:"sq_tfsa",  owner:"Person 1",  inst:"Questrade",   type:"TFSA",        bal:0, h:[],lu:null},
  {id:"qt_tfsa",  owner:"Person 1",  inst:"Qtrade",      type:"TFSA",        bal:0,      h:[],lu:null},
  {id:"bq_rrsp",  owner:"Person 2", inst:"Questrade",   type:"RRSP",        bal:0, h:[],lu:null},
  {id:"bq_tfsa",  owner:"Person 2", inst:"Questrade",   type:"TFSA",        bal:0, h:[],lu:null},
  {id:"brb_rrsp", owner:"Person 2", inst:"RBC",         type:"RRSP",        bal:0,      h:[],lu:null},
  {id:"brb_resp", owner:"Person 2", inst:"RBC",         type:"RESP",        bal:0,      h:[],lu:null},
  {id:"sun_pen",  owner:"Person 2", inst:"Sun Life",    type:"Pension DB",  bal:0,      h:[],lu:null,isPension:true,annualPension:0},
  {id:"rb_mort",  owner:"Joint",  inst:"RBC",         type:"Mortgage",    bal:0, h:[],lu:null,isLiab:true},
  {id:"cibc_cott",owner:"Joint",  inst:"CIBC",        type:"Cottage Mtg", bal:0, h:[],lu:null,isLiab:true},
  {id:"home_val", owner:"Joint",  inst:"Real Estate", type:"Primary Home",bal:0, h:[],lu:null,isAsset:true},
  {id:"cott_val", owner:"Joint",  inst:"Real Estate", type:"Cottage",     bal:0, h:[],lu:null,isAsset:true},
];

const DP={
  shawnAge:50,retAge:60,bonnieAge:50,bonRetAge:57,
  shawnRRSP:0,bonRRSP:0,shawnTFSA:0,bonTFSA:0,nonReg:0,
  shawnSal:0,bonSal:0,shawnContrib:0,
  bonPension:0,shawnCPP:0,bonCPP:0,
  shawnCPPAge:65,bonCPPAge:65,shawnOASAge:70,bonOASAge:65,
  returnRate:8,inflation:2.5,targetSpend:0,
  carryforward:0,d1:0,d2:0,d3:0,endAge:90,
};

const DS={accounts:DA,plan:DP,history:[],scenarios:[]};

// ── Formatters ────────────────────────────────────────────────────────────────
function f$(n){if(n==null)return"$0";const neg=n<0,v=Math.abs(n);const s=v>=1e6?"$"+(v/1e6).toFixed(2)+"M":v>=1000?"$"+(v/1000).toFixed(0)+"K":"$"+Math.round(v).toLocaleString();return neg?"-"+s:s;}
function fPct(n){return(n*100).toFixed(1)+"%";}
function fD(iso){if(!iso)return"Never";return new Date(iso).toLocaleDateString("en-CA",{year:"numeric",month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"});}
function now(){return new Date().toISOString();}

// ── Projection engine ─────────────────────────────────────────────────────────
function project(plan,overrideRate,overrideDD,overrideRetAge,overrideBonRetAge){
  const r=(overrideRate!=null?overrideRate:plan.returnRate)/100;
  const retAge=overrideRetAge!=null?overrideRetAge:plan.retAge;
  const bonRetAge=overrideBonRetAge!=null?overrideBonRetAge:plan.bonRetAge;
  const d1=overrideDD?overrideDD.d1:plan.d1;
  const d2=overrideDD?overrideDD.d2:plan.d2;
  const d3=overrideDD?overrideDD.d3:plan.d3;
  let rrsp=plan.shawnRRSP,tfsa=plan.shawnTFSA+plan.bonTFSA,nr=plan.nonReg||0,lt=0;
  const yrs=[];
  for(let age=plan.shawnAge;age<=plan.endAge;age++){
    const ret=age>=retAge;
    const bAge=plan.bonnieAge+(age-plan.shawnAge);
    const bonRet=bAge>=bonRetAge;
    if(!ret){
      rrsp=rrsp*(1+r)+plan.shawnContrib;
      tfsa=tfsa*(1+r)+TROOM*2;
      yrs.push({age,rrsp,tfsa,nr,income:plan.shawnSal+plan.bonSal,tax:0,dd:0,guar:0,wealth:rrsp+tfsa+nr,lt:0});
      continue;
    }
    let guar=bonRet?plan.bonPension:0;
    if(age>=plan.shawnCPPAge)guar+=plan.shawnCPP;
    if(bAge>=plan.bonCPPAge)guar+=plan.bonCPP;
    const sOAS=age>=plan.shawnOASAge?OAS*(plan.shawnOASAge>=70?1.36:1):0;
    const bOAS=bAge>=plan.bonOASAge?OAS:0;
    guar+=sOAS+bOAS;
    let dd;
    if(age>=71){dd=rrsp*(RR[Math.min(age,90)]||0.1057);}
    else{dd=age<65?d1:age<68?d2:d3;dd=Math.min(dd,rrsp);}
    const need=Math.max(0,plan.targetSpend-guar);
    const actual=Math.max(dd,Math.min(need,rrsp));
    const t=tax(actual),mr=mRate(actual);
    lt+=t;
    const oasc=actual>OASC?Math.min(sOAS,(actual-OASC)*0.15):0;
    rrsp=Math.max(0,(rrsp-actual)*(1+r));
    tfsa=tfsa*(1+r)+TROOM*2;
    nr=nr*(1+r);
    yrs.push({age,rrsp,tfsa,nr,income:guar+actual-t-oasc,guar,dd:actual,tax:t,mr,oasc,wealth:rrsp+tfsa+nr,lt});
  }
  return yrs;
}

// ── Styles ────────────────────────────────────────────────────────────────────
const CS={
  card:{background:"#131d35",borderRadius:10,padding:"16px 18px",marginBottom:14},
  lbl:{color:"#8899bb",fontSize:11,marginBottom:3},
  tt:{background:"#0d1526",border:"1px solid #243050",borderRadius:8,color:"#e8edf8",fontSize:11},
  inp:{background:"#0d1526",border:"1px solid #243050",borderRadius:6,color:"#e8edf8",padding:"6px 8px",fontSize:12,width:"100%"},
  sel:{background:"#0d1526",border:"1px solid #243050",borderRadius:6,color:"#e8edf8",padding:"6px 8px",fontSize:12,width:"100%"},
  btn:(c)=>({background:c||"#1a2744",border:"none",borderRadius:6,color:"#e8edf8",padding:"7px 14px",fontSize:12,cursor:"pointer",fontWeight:600}),
  bdg:(c)=>({background:c+"33",color:c,borderRadius:20,padding:"2px 8px",fontSize:10,fontWeight:700,display:"inline-block"}),
};
function SC({label,value,sub,color}){
  return React.createElement("div",{style:{...CS.card,flex:"1 1 140px",minWidth:130}},
    React.createElement("div",{style:CS.lbl},label),
    React.createElement("div",{style:{color:color||"#7EB8F7",fontSize:20,fontWeight:700}},value),
    sub?React.createElement("div",{style:{color:"#5a6a8a",fontSize:10,marginTop:3}},sub):null
  );
}
function NI({label,value,onChange,prefix,suffix,step,max,min}){
  return React.createElement("div",{style:{marginBottom:10}},
    React.createElement("div",{style:CS.lbl},label),
    React.createElement("div",{style:{display:"flex",alignItems:"center",gap:5}},
      prefix?React.createElement("span",{style:{color:"#7EB8F7",fontSize:12}},prefix):null,
      React.createElement("input",{type:"number",value,step:step||1000,min:min||0,max,onChange:(e)=>onChange(Number(e.target.value)),style:CS.inp}),
      suffix?React.createElement("span",{style:{color:"#7EB8F7",fontSize:12}},suffix):null
    )
  );
}
function SR(ch){return React.createElement("div",{style:{display:"flex",gap:12,flexWrap:"wrap",marginBottom:14}},ch);}

function Chart({type,data,series,height,stacked,cols,yKey}){
  const cc=cols||CLR;
  if(type==="pie"){
    return React.createElement(ResponsiveContainer,{width:"100%",height:height||180},
      React.createElement(PieChart,null,
        React.createElement(Pie,{data,cx:"50%",cy:"50%",outerRadius:65,dataKey:"value",label:(e)=>e.name.split(" ")[0]+": "+f$(e.value)},
          ...data.map((_,i)=>React.createElement(Cell,{key:i,fill:cc[i%cc.length]}))
        ),
        React.createElement(Tooltip,{contentStyle:CS.tt,formatter:(v)=>[f$(v),""]})
      )
    );
  }
  const Ch=type==="bar"?BarChart:LineChart;
  const S=type==="bar"?Bar:Line;
  const xKey=yKey||"age";
  return React.createElement(ResponsiveContainer,{width:"100%",height:height||260},
    React.createElement(Ch,{data},
      React.createElement(CartesianGrid,{strokeDasharray:"3 3",stroke:"#1a2744"}),
      React.createElement(XAxis,{dataKey:xKey,stroke:"#5a6a8a",fontSize:10}),
      React.createElement(YAxis,{stroke:"#5a6a8a",fontSize:10,tickFormatter:(v)=>"$"+v+"K"}),
      React.createElement(Tooltip,{contentStyle:CS.tt,formatter:(v)=>["$"+v+"K",""]}),
      React.createElement(Legend,{wrapperStyle:{fontSize:11}}),

// SCENARIO MODELER COMPONENT
// ══════════════════════════════════════════════════════════════════════════════
function ScenarioModeler({basePlan}){
  const [scenarios,setScenarios]=useState([
    {id:1,label:"Base Case",returnRate:8,retAge:60,bonRetAge:57,d1:0,d2:0,d3:0,color:"#27AE60",active:true},
    {id:2,label:"Conservative Return",returnRate:6,retAge:60,bonRetAge:57,d1:0,d2:0,d3:0,color:"#4A90D9",active:true},
    {id:3,label:"Optimistic Return",returnRate:10,retAge:60,bonRetAge:57,d1:0,d2:0,d3:0,color:"#E67E22",active:true},
    {id:4,label:"Retire Later (63/60)",returnRate:8,retAge:63,bonRetAge:60,d1:0,d2:0,d3:0,color:"#9B59B6",active:false},
  ]);
  const [editing,setEditing]=useState(null);
  const [chartMetric,setChartMetric]=useState("wealth");
  const [highlightAge,setHighlightAge]=useState(null);

  const activeScenarios=scenarios.filter(s=>s.active);

  const projections=useMemo(()=>scenarios.map(s=>({
    id:s.id,
    label:s.label,
    color:s.color,
    data:project({...basePlan,shawnRRSP:basePlan.shawnRRSP,bonTFSA:basePlan.bonTFSA,shawnTFSA:basePlan.shawnTFSA},s.returnRate,{d1:s.d1,d2:s.d2,d3:s.d3},s.retAge,s.bonRetAge)
  })),[scenarios,basePlan]);

  function addScenario(){
    const newId=Math.max(...scenarios.map(s=>s.id))+1;
    setScenarios(prev=>[...prev,{
      id:newId,label:"Scenario "+newId,returnRate:8,retAge:60,bonRetAge:57,
      d1:0,d2:0,d3:0,color:CLR[newId%CLR.length],active:true
    }]);
    setEditing(newId);
  }
  function updateScenario(id,fields){setScenarios(prev=>prev.map(s=>s.id===id?{...s,...fields}:s));}
  function deleteScenario(id){setScenarios(prev=>prev.filter(s=>s.id!==id));}
  function toggleScenario(id){updateScenario(id,{active:!scenarios.find(s=>s.id===id).active});}

  // Build comparison chart data
  const compData=useMemo(()=>{
    const ages=[];
    for(let a=basePlan.shawnAge;a<=basePlan.endAge;a++)ages.push(a);
    return ages.map(age=>{
      const pt={age};
      projections.filter(p=>scenarios.find(s=>s.id===p.id&&s.active)).forEach(p=>{
        const yr=p.data.find(y=>y.age===age)||{};
        if(chartMetric==="wealth") pt[p.label]=Math.round((yr.wealth||0)/1000);
        else if(chartMetric==="rrsp") pt[p.label]=Math.round((yr.rrsp||0)/1000);
        else if(chartMetric==="income") pt[p.label]=Math.round((yr.income||0)/1000);
        else if(chartMetric==="tax") pt[p.label]=Math.round((yr.tax||0)/1000);
      });
      return pt;
    });
  },[projections,scenarios,chartMetric,basePlan]);

  // Summary table
  const summaryRows=projections.map(p=>{
    const s=scenarios.find(sc=>sc.id===p.id);
    const atRet=p.data.find(y=>y.age===s.retAge)||{};
    const at71=p.data.find(y=>y.age===71)||{};
    const atEnd=p.data[p.data.length-1]||{};
    const retired=p.data.filter(y=>y.dd>0);
    const avgRate=retired.reduce((a,y)=>a+(y.mr||0),0)/Math.max(retired.length,1);
    return{id:p.id,label:p.label,color:p.color,active:s.active,
      returnRate:s.returnRate,retAge:s.retAge,bonRetAge:s.bonRetAge,
      wealthAtRet:atRet.wealth,rrspAt71:at71.rrsp,estateAt90:atEnd.wealth,lifetimeTax:atEnd.lt,avgMargRate:avgRate};
  });

  const activeColors=activeScenarios.map(s=>s.color);
  const activeSeries=activeScenarios.map(s=>s.label);

  return React.createElement("div",null,
    // Metric selector + Add button
    React.createElement("div",{style:{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap",alignItems:"center"}},
      React.createElement("div",{style:{flex:1,minWidth:160}},
        React.createElement("div",{style:CS.lbl},"Chart Metric"),
        React.createElement("select",{value:chartMetric,onChange:(e)=>setChartMetric(e.target.value),style:CS.sel},
          React.createElement("option",{value:"wealth"},"Total Wealth ($000s)"),
          React.createElement("option",{value:"rrsp"},"RRSP Balance ($000s)"),
          React.createElement("option",{value:"income"},"Annual Net Income ($000s)"),
          React.createElement("option",{value:"tax"},"Annual Tax Paid ($000s)")
        )
      ),
      React.createElement("button",{onClick:addScenario,style:{...CS.btn("#27AE60"),alignSelf:"flex-end"}},"+ Add Scenario")
    ),

    // Comparison chart

      React.createElement("div",{style:{color:"#7EB8F7",fontWeight:700,marginBottom:4,fontSize:12}},
        chartMetric==="wealth"?"Total Wealth Comparison ($000s)":
        chartMetric==="rrsp"?"RRSP Balance Comparison ($000s)":
        chartMetric==="income"?"Annual Net Income Comparison ($000s)":
        "Annual Tax Paid Comparison ($000s)"
      ),
      React.createElement("div",{style:{color:"#5a6a8a",fontSize:10,marginBottom:12}},"Dashed orange line = RRIF conversion at age 71"),
      React.createElement(ResponsiveContainer,{width:"100%",height:300},
        React.createElement(LineChart,{data:compData,onMouseMove:(e)=>{if(e&&e.activeLabel)setHighlightAge(e.activeLabel);},onMouseLeave:()=>setHighlightAge(null)},
          React.createElement(CartesianGrid,{strokeDasharray:"3 3",stroke:"#1a2744"}),
          React.createElement(XAxis,{dataKey:"age",stroke:"#5a6a8a",fontSize:10}),
          React.createElement(YAxis,{stroke:"#5a6a8a",fontSize:10,tickFormatter:(v)=>"$"+v+"K"}),
          React.createElement(Tooltip,{contentStyle:CS.tt,formatter:(v)=>["$"+v+"K",""]}),
          React.createElement(Legend,{wrapperStyle:{fontSize:11}}),
          React.createElement(ReferenceLine,{x:71,stroke:"#E67E22",strokeDasharray:"4 4"}),
          ...activeSeries.map((s,i)=>React.createElement(Line,{key:s,type:"monotone",dataKey:s,stroke:activeColors[i],strokeWidth:2,dot:false}))
        )
      )
    ),

    // Summary comparison table
    React.createElement("div",{style:CS.card},
      React.createElement("div",{style:{color:"#7EB8F7",fontWeight:700,marginBottom:12,fontSize:12}},"Scenario Summary"),
      React.createElement("div",{style:{overflowX:"auto"}},
        React.createElement("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:11,minWidth:600}},
          React.createElement("thead",null,React.createElement("tr",{style:{color:"#5a6a8a"}},
            ["Scenario","Return","Retire","Person 2","Wealth@Ret","RRSP@71","Estate@90","LifetimeTax","AvgRate",""].map(h=>
              React.createElement("th",{key:h,style:{padding:"5px 8px",borderBottom:"1px solid #1a2744",textAlign:"left",whiteSpace:"nowrap"}},h)
            )

                React.createElement("div",{style:{display:"flex",alignItems:"center",gap:6}},
                  React.createElement("div",{style:{width:10,height:10,borderRadius:"50%",background:row.color,flexShrink:0}}),

  return React.createElement("div",{style:{background:"#0a1020",minHeight:"100vh",padding:"16px 14px",paddingBottom:40}},

          style:{padding:"9px 12px",background:active?"#1a2744":"transparent",color:active?"#7EB8F7":"#8899bb",border:"none",borderBottom:active?"2px solid #7EB8F7":"2px solid transparent",cursor:"pointer",fontWeight:active?700:400,fontSize:11,whiteSpace:"nowrap"}},t.label);
